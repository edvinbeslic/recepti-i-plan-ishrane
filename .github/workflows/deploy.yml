name: Deploy to GCP

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v1
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v1

      - name: Configure Docker
        run: gcloud auth configure-docker europe-west1-docker.pkg.dev

      - name: Build and push Frontend
        run: |
          docker build -t europe-west1-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/recepti/frontend:latest ./frontend
          docker push europe-west1-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/recepti/frontend:latest

      - name: Build and push Backend
        run: |
          docker build -t europe-west1-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/recepti/backend:latest ./backend
          docker push europe-west1-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/recepti/backend:latest

      - name: Deploy Frontend to Cloud Run
        run: |
          gcloud run deploy recepti-frontend \
            --image europe-west1-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/recepti/frontend:latest \
            --platform managed \
            --region europe-west1 \
            --allow-unauthenticated

      - name: Deploy Backend to Cloud Run
        run: |
          gcloud run deploy recepti-backend \
            --image europe-west1-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/recepti/backend:latest \
            --platform managed \
            --region europe-west1 \
            --allow-unauthenticated