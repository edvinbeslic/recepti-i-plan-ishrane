version: '3.8'

services:
  backend:
    build: ./backend
    ports:
      
"${BACKEND_PORT:-3001}:3001"
  volumes:
db_data:/app/db.json
environment:
PORT=3001
healthcheck:
  test: ["CMD", "wget", "--spider", "http://localhost:3001/recepti"]
  interval: 30s
  timeout: 10s
  retries: 3

  frontend:
    build: ./frontend
    ports:
      
"${FRONTEND_PORT:-80}:80"
  environment:
VITE_API_URL=http://backend:3001/
depends_on:
backend

volumes:
  db_data: